<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#06070d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Love Loop">
    <title>Love Loop</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/app-icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <canvas id="visualizer" class="visualizer" aria-hidden="true"></canvas>
    <img class="scene-art" src="assets/couple-quiz.svg" alt="" aria-hidden="true">

    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">?</div>
          <div>
            <h1>Love Loop</h1>
            <p>Endless questions for two</p>
          </div>
        </div>

        <div class="status-row" aria-label="Game status">
          <div class="status-pill">
            <strong id="roundNumber">1</strong>
            <span>Round</span>
          </div>
          <div class="status-pill">
            <strong id="seenCount">0</strong>
            <span>Seen</span>
          </div>
          <div class="status-pill accent">
            <strong id="deckLeft">0</strong>
            <span>Queued</span>
          </div>
        </div>
      </header>

      <section class="game-layout">
        <aside class="control-panel" aria-label="Game controls">
          <div class="panel-section">
            <h2>Players</h2>
            <label>
              <span>Player 1</span>
              <input id="playerOne" type="text" value="You" maxlength="18" autocomplete="off">
            </label>
            <label>
              <span>Player 2</span>
              <input id="playerTwo" type="text" value="Girlfriend" maxlength="18" autocomplete="off">
            </label>
          </div>

          <div class="panel-section">
            <h2>Category</h2>
            <div class="segmented" id="categoryFilters" role="group" aria-label="Question category">
              <button class="is-active" type="button" data-filter="All">All</button>
              <button type="button" data-filter="Love">Love</button>
              <button type="button" data-filter="Deep">Deep</button>
              <button type="button" data-filter="Mindbend">Mindbend</button>
              <button type="button" data-filter="Funny">Funny</button>
              <button type="button" data-filter="Future">Future</button>
              <button type="button" data-filter="Flirty">Flirty</button>
              <button type="button" data-filter="Wildcard">Wild</button>
            </div>
          </div>

          <div class="panel-section">
            <h2>Mood</h2>
            <div class="segmented two-col" id="moodFilters" role="group" aria-label="Question mood">
              <button class="is-active" type="button" data-mood="Any">Any</button>
              <button type="button" data-mood="Light">Light</button>
              <button type="button" data-mood="Deep">Deep</button>
              <button type="button" data-mood="Bold">Bold</button>
            </div>
          </div>
        </aside>

        <section class="question-stage" aria-live="polite" tabindex="-1">
          <div class="stage-topline">
            <span id="categoryBadge" class="category-badge">Love</span>
            <span id="turnBadge" class="turn-badge">You ask Girlfriend</span>
          </div>

          <article class="question-card">
            <p id="moodLabel" class="mood-label">Sweet</p>
            <h2 id="questionText">Loading...</h2>
            <p id="followText" class="follow-text"></p>
          </article>

          <div class="action-row" aria-label="Question actions">
            <button id="previousButton" class="icon-button" type="button" title="Previous question" aria-label="Previous question">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 18 9 12l6-6"></path>
              </svg>
            </button>
            <button id="nextButton" class="primary-action" type="button" title="Next question">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14"></path>
                <path d="m13 6 6 6-6 6"></path>
              </svg>
              <span>Next</span>
              <kbd>Space</kbd>
            </button>
            <button id="shuffleButton" class="icon-button" type="button" title="Shuffle deck" aria-label="Shuffle deck">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m18 14 3 3-3 3"></path>
                <path d="m18 4 3 3-3 3"></path>
                <path d="M3 17h3.5c1.7 0 3.1-.9 4-2.3l3-5C14.4 8 15.8 7 17.5 7H21"></path>
                <path d="M3 7h3.5c1.1 0 2.1.4 2.9 1.1"></path>
                <path d="m12.5 14.8 1 1.7c.9 1.5 2.3 2.5 4 2.5H21"></path>
              </svg>
            </button>
            <button id="saveButton" class="icon-button" type="button" title="Save question" aria-label="Save question">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 21 12 17 5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
              </svg>
            </button>
          </div>
        </section>

        <aside class="saved-panel" aria-label="Saved questions">
          <div class="saved-header">
            <h2>Saved</h2>
            <button id="clearSavedButton" type="button">Clear</button>
          </div>
          <div id="savedList" class="saved-list">
            <p class="empty-state">No saved questions yet.</p>
          </div>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
